name: Sync Upstream Repository

on:
  schedule:
    - cron: '0 16 * * *'  # 每天 UTC 16:00 (北京时间 00:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/0xdabiaoge/singbox-lite.git 2>/dev/null || true
          git fetch upstream main --depth=1

      - name: Sync and check changes
        id: sync
        run: |
          # 检查文件是否存在于上游
          if git cat-file -e upstream/main:singbox.sh 2>/dev/null; then
            git checkout upstream/main -- singbox.sh
            chmod +x singbox.sh
            
            if git diff --quiet HEAD singbox.sh; then
              echo "has_changes=false" >> $GITHUB_OUTPUT
              echo "✅ singbox.sh 无变化"
            else
              echo "has_changes=true" >> $GITHUB_OUTPUT
              echo "🔄 singbox.sh 已更新"
              # 显示变更详情
              echo "📝 变更内容："
              git diff --stat HEAD singbox.sh
            fi
          else
            echo "❌ 上游仓库中不存在 singbox.sh"
            exit 1
          fi

      - name: Commit and push
        if: steps.sync.outputs.has_changes == 'true'
        run: |
          git add singbox.sh
          git commit -m "🔄 sync: update singbox.sh from upstream ($(date -u '+%Y-%m-%d %H:%M:%S UTC'))"
          git push

      - name: Push notification (optional)
        if: steps.sync.outputs.has_changes == 'true'
        run: |
          echo "✅ 同步成功！"
          echo "📅 同步时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"